version: "3.8"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: my-chatbot:latest
    ports:
      - "8000:8000"
    volumes:
      - ./:/app           
    command: uvicorn app.api:app --host 0.0.0.0 --port 8000 --reload
    environment:
      - ENV=development
    restart: unless-stopped
    env_file:
      - .env

  ui:
    build:
      context: .
      dockerfile: Dockerfile
    image: my-chatbot:latest
    ports:
      - "8501:8501"
    volumes:
      - ./:/app           
    command: >
      sh -c "streamlit run UI/streamlit_app.py 
      --server.port=8501 
      --server.address=0.0.0.0"
    environment:
      - ENV=development
      - API_URL=http://api:8000/api
    restart: unless-stopped